<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CiberNova — Soluciones avanzadas de ciberseguridad para personas y empresas en República Dominicana. Protegemos tu mundo digital." />
    <meta name="keywords" content="ciberseguridad, seguridad informática, protección digital, antivirus, República Dominicana, CiberNova" />
    <meta name="author" content="CiberNova" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>CiberNova — Protegemos tu mundo digital</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        color: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
      }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '🛡️ CiberNova — Cargando...';
        font-family: 'Outfit', 'Inter', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #00d4ff, #0077ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      noscript {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
        color: #a0a0b0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div>
        <h1 style="font-size: 2rem; margin-bottom: 16px; background: linear-gradient(135deg, #00d4ff, #0077ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🛡️ CiberNova</h1>
        <p>Necesitas tener JavaScript habilitado para ver este sitio.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
